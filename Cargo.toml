[package]
name = "procnet"
version = "0.1.0"
edition = "2024"

[profile.release]
codegen-units = 1
lto = "fat"
debug = false
strip = true

[profile.profiling]
inherits = "release"
debug = true
strip = false

[dependencies]
anyhow = "1.0.102"
fxhash = "0.2.1"
log = "0.4"
log4rs = "1.4.0"
libc = "0.2.183"
libbpf-rs = "0.26.0"
ratatui = "0.30.0"

[build-dependencies]
libbpf-cargo = "0.26.0"
